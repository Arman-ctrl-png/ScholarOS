<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarOS | Virtual Study Desktop</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>  

    <div class="desktop" id="desktop" style="position: relative;">

        <!-- 🔥 bottom left CLOCK -->
        <div style="
            position: absolute;
            bottom: 50px;
            left: 30px;
            font-size: 50px;
            font-weight: bold;
        ">
            <span id="clock">00:00:00</span>
        </div>

        <!-- 🔥 CENTER TITLE (REPLACED CLOCK) -->
        <div style="
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        ">
            <div style="
                font-size: 60px;
                font-weight: bold;
                margin-bottom: 30px;
                letter-spacing: 3px;
            ">
                ScholarOS
            </div>

            <!-- ICON GRID -->
            <div style="
                display: grid;
                grid-template-columns: repeat(3, 150px);
                gap: 25px;
                justify-content: center;
            ">

                <div onclick="openApp('wallpaper')" style="
                    width:150px;height:150px;cursor:pointer;
                    background: rgba(255,255,255,0.1);
                    border-radius:15px;
                    display:flex;flex-direction:column;
                    align-items:center;justify-content:center;
                ">
                    <i class="fas fa-image" style="font-size:50px; color:#ff6b6b;"></i>
                    <div>Wallpapers</div>
                </div>

                <div onclick="openApp('timetable')" style="
                    width:150px;height:150px;cursor:pointer;
                    background: rgba(255,255,255,0.1);
                    border-radius:15px;
                    display:flex;flex-direction:column;
                    align-items:center;justify-content:center;
                ">
                    <i class="fas fa-calendar-alt" style="font-size:50px; color:#4ecdc4;"></i>
                    <div>Time Table</div>
                </div>

                <div onclick="openApp('notes')" style="
                    width:150px;height:150px;cursor:pointer;
                    background: rgba(255,255,255,0.1);
                    border-radius:15px;
                    display:flex;flex-direction:column;
                    align-items:center;justify-content:center;
                ">
                    <i class="fas fa-edit" style="font-size:50px; color:#ffe66d;"></i>
                    <div>Notes</div>
                </div>

                <div onclick="openApp('timer')" style="
                    width:150px;height:150px;cursor:pointer;
                    background: rgba(255,255,255,0.1);
                    border-radius:15px;
                    display:flex;flex-direction:column;
                    align-items:center;justify-content:center;
                ">
                    <i class="fas fa-clock" style="font-size:50px; color:#5f27cd;"></i>
                    <div>Timer</div>
                </div>

                <div onclick="openApp('library')" style="
                    width:150px;height:150px;cursor:pointer;
                    background: rgba(255,255,255,0.1);
                    border-radius:15px;
                    display:flex;flex-direction:column;
                    align-items:center;justify-content:center;
                ">
                    <i class="fas fa-book" style="font-size:50px; color:#1dd1a1;"></i>
                    <div>Library</div>
                </div>

            </div>
        </div>

        <div id="window-container"></div>
    </div>

    <!-- TASKBAR -->
    <div class="taskbar" style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding: 0 20px;
    ">
        <div class="start-btn">
            <i class="fas fa-graduation-cap"></i> ScholarOS
        </div>

        <div style="font-size:14px;">
            Study Mode 🚀
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
